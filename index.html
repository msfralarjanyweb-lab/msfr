<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شركة مسفر محمد العرجاني للمحاماة</title>
    <!-- حماية من الروبوتات الضارة -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <script
      src="https://cdn.tailwindcss.com"
    ></script>
    <script src="/tailwind-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="%VITE_SITE_URL%" data-requires-site-url />

    <!-- Favicons for browsers and social previews -->
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/images/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/images/favicon-64x64.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph / WhatsApp preview -->
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:site_name" content="شركة مسفر محمد العرجاني للمحاماة" />
    <meta property="og:url" content="%VITE_SITE_URL%" data-requires-site-url />
    <meta property="og:title" content="شركة مسفر محمد العرجاني للمحاماة" />
    <meta
      property="og:description"
      content="فريق قانوني متخصص يقدم استشارات وتمثيل قانوني احترافي في المملكة."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="%VITE_SITE_URL%/images/social-share.png"
      data-requires-site-url
      data-path="/images/social-share.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="%VITE_SITE_URL%" data-requires-site-url />
    <meta name="twitter:title" content="شركة مسفر محمد العرجاني للمحاماة" />
    <meta
      name="twitter:description"
      content="خدمات قانونية متكاملة لرواد الأعمال والشركات والأفراد."
    />
    <meta
      name="twitter:image"
      content="%VITE_SITE_URL%/images/social-share.png"
      data-requires-site-url
      data-path="/images/social-share.png"
    />
    <script>
      (function () {
        var raw = "%VITE_SITE_URL%".trim();
        var base = raw || window.location.origin;
        if (!base) return;
        var normalized = base.replace(/\/$/, "");
        document.querySelectorAll("[data-requires-site-url]").forEach(function (el) {
          var path = el.getAttribute("data-path") || "";
          var value = normalized + path;
          if (el.tagName === "LINK" && el.hasAttribute("href")) {
            el.setAttribute("href", value || normalized);
          } else {
            el.setAttribute("content", value || normalized);
          }
        });
      })();
    </script>
    <script type="importmap" src="/importmap.json"></script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-white text-dark antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
