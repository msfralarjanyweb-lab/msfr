[build]
  command = "npm run build"
  publish = "dist"

# Ignore secret scanning for Vite environment variables
# These are public keys meant to be embedded in client-side code
# VITE_* variables are safe to expose in client-side code
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "dist/**"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# حماية من الروبوتات الضارة والحد من استهلاك الباندويث
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# حماية الملفات الثابتة من الروبوتات الضارة
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Robots-Tag = "noindex, nofollow"

# Rate limiting headers (يتم التعامل معها من Netlify)
[[headers]]
  for = "/*"
  [headers.values]
    X-RateLimit-Limit = "100"
    X-RateLimit-Remaining = "99"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

