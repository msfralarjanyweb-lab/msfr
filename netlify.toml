[build]
  command = "npm run build"
  publish = "dist"

# Ignore secret scanning for Vite environment variables
# These are public keys meant to be embedded in client-side code
[build.processing]
  skip_processing = false

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

